<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Token Tracker Pet</title>
    <meta name="robots" content="noindex" />
    <style>
      /* Fully transparent surface: the Windows PetWindow composites the WebView2
         alpha with its DWM backdrop, so anything not painted here stays see-through. */
      html,
      body,
      #pet-root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: transparent !important;
        overflow: hidden;
      }
      body {
        /* Whole surface is a drag handle (the host starts a native move on
           mousedown); show the grab affordance. */
        cursor: grab;
        -webkit-user-select: none;
        user-select: none;
      }
      body:active {
        cursor: grabbing;
      }
    </style>
  </head>
  <body>
    <div id="pet-root"></div>
    <script type="module" src="/src/pet.jsx"></script>
  </body>
</html>
